<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
color:white;
text-align:center;
}

h1{
font-size:45px;
margin-bottom:10px;
}

p{
font-size:18px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.bouquet{
font-size:70px;
margin-top:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

.envelope{
width:200px;
height:120px;
background:white;
position:relative;
margin-top:30px;
border-radius:10px;
cursor:pointer;
}

.flap{
position:absolute;
width:0;
height:0;
border-left:100px solid transparent;
border-right:100px solid transparent;
border-bottom:60px solid #ff4b6e;
top:-60px;
transition:0.5s;
}

.letter{
position:absolute;
top:20px;
left:10px;
right:10px;
bottom:10px;
background:#fff5f7;
color:#ff4b6e;
border-radius:5px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-size:14px;
opacity:0;
transition:0.5s;
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
opacity:1;
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:rise 6s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<h1>🌸 Happy Women's Day 🌸</h1>
<p>Click the bouquet and open the envelope 💌</p>

<div class="bouquet" onclick="showEnvelope()">💐</div>

<div class="envelope" id="envelope" onclick="openLetter()" style="display:none;">
<div class="flap"></div>
<div class="letter">
You are strong, beautiful and inspiring.  
Thank you for making the world brighter 💖
</div>
</div>

<button onclick="celebrate()">Celebrate 🎉</button>

<script>

function showEnvelope(){
document.getElementById("envelope").style.display="block";
}

function openLetter(){
document.getElementById("envelope").classList.toggle("open");
}

function celebrate(){
alert("Happy Women's Day to the most amazing women in my life 💐");
}

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
